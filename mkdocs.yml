site_name: VLM — Analyse des loadlibs z/OS
site_description: >
  Analyse et extraction des loadlibs IBM z/OS à partir des rapports
  IBM File Manager (View Load Module) — pipeline Python vers JSON et CSV.
site_author: Alan MARCHAND
docs_dir: doc

theme:
  name: material
  language: fr
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Passer en mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Passer en mode clair
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - def_list
  - footnotes
  - toc:
      permalink: true
      title: Sur cette page
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
  - awesome-pages
  - include-markdown
  - macros

extra_css:
  - stylesheets/extra.css

extra:
  generator: false

nav:
  - Accueil: index.md
  - VLM:
      - pipeline.py: pipeline/business_rules.md
      - clean_report.py: clean_report/business_rules.md
      - reformat_copt.py: reformat_copt/business_rules.md
      - build_json.py: build_json/business_rules.md
      - extract_copt.py: extract_copt/business_rules.md
      - inspect_copt.py: inspect_copt/business_rules.md
      - export_csv.sh:
          - Guide: export_csv/guide.md
          - Guide jq: export_csv/jq.md
  - Développement:
      - Installation: dev/installation.md
      - Tests: dev/tests.md
      - Qualité du code: dev/qualite.md
